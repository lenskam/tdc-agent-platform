services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tdc-backend
    ports:
      - "${API_PORT:-8001}:8000"
    volumes:
      - ./backend:/app
      - chroma_db:/app/chroma_db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - API_URL=http://tdc-backend:8000
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - tdc-network
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: tdc-dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file:
      - ./.env
    depends_on:
      - backend
    networks:
      - tdc-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: tdc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tdc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tdc_password}
      POSTGRES_DB: ${POSTGRES_DB:-tdc_agent_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${EXTERNAL_POSTGRES_PORT:-5435}:5432"
    networks:
      - tdc-network

  redis:
    image: redis:7-alpine
    container_name: tdc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6381}:6379"
    networks:
      - tdc-network

volumes:
  postgres_data:
  redis_data:
  chroma_db:

networks:
  tdc-network:
    driver: bridge
