version: '3.8'

services:
  backend:
    build: .
    container_name: tdc-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - POSTGRES_HOST=db
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - tdc-network

  db:
    image: postgres:16-alpine
    container_name: tdc-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tdc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tdc_password}
      POSTGRES_DB: ${POSTGRES_DB:-tdc_agent_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tdc-network

volumes:
  postgres_data:
  chroma_db:

networks:
  tdc-network:
    driver: bridge
